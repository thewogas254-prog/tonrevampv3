<!doctype html>
<html lang="en">
  <head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Blogs - TON</title><link rel="stylesheet" href="styles.css" /><link rel="stylesheet" href="shell.css" /></head>
  <body data-page="blogs">
    <div class="app-shell"><header class="topbar"><div class="brand"><img class="brand-mark" id="brand-logo" src="logo/ton.png" alt="TON logo" /><div><strong id="brand-name">Teachers Online Network</strong><span id="brand-subtitle"></span></div></div><nav class="top-links"><button data-nav="news">News</button><button data-nav="blogs">Blogs</button><button data-nav="videos">Videos</button><button data-nav="shop">Shop</button><button data-nav="partner">Partner Ads</button><button data-nav="profile">Profile</button></nav></header><aside class="sidenav"><button data-nav="swap">SwapTool</button><button data-nav="matches">Matches</button><button data-nav="messages">Messages</button><button data-nav="notifications">Notifications</button><button data-nav="videos">Videos</button><button data-nav="partner">Partner Ads</button><button data-nav="my-shop">My Shop</button><button data-nav="my-blog">My Blog/Vlog</button></aside><main class="content"><section class="route-card"><div class="page-header"><div><p class="eyebrow">Blogs and Vlogs</p><h2>Creator Knowledge Hub</h2></div><div class="filter-controls"><select id="blog-filter"><option>All</option><option>TSC</option><option>CBC</option><option>STEM</option><option>Literature</option><option>Technology</option></select><input type="search" id="blog-search" placeholder="Search blogs..." /></div></div><div class="auth-message" id="page-message"></div><div class="blogs-layout"><div class="blogs-list" id="blogs-list"></div><div class="blog-reader" id="blog-reader" style="display: none;"><div class="blog-header"><button class="back-btn" id="back-to-blogs">← Back to Blogs</button><div class="blog-meta"><h1 id="blog-title"></h1><div class="blog-info"><span class="blog-author">By <strong id="blog-author"></strong></span><span class="blog-date" id="blog-date"></span><span class="blog-topic" id="blog-topic"></span></div></div><div class="blog-actions" id="blog-actions"><button class="action-btn like-btn" id="like-btn">👍 <span id="like-count">0</span></button><button class="action-btn share-btn" id="share-btn">📤 Share</button><button class="action-btn bookmark-btn" id="bookmark-btn">🔖 Bookmark</button><button class="action-btn report-btn" id="report-btn">🚨 Report</button></div></div><div class="blog-content" id="blog-content"></div><div class="comments-section"><h3>Comments (<span id="comment-count">0</span>)</h3><div class="comment-form" id="comment-form"><textarea id="comment-input" placeholder="Write a comment..." rows="3"></textarea><button id="submit-comment" disabled>Post Comment</button></div><div class="comments-list" id="comments-list"></div></div></div></div></section></main></div>
    <script src="multipage.js"></script>
  </body>
</html>
