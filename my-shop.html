<!doctype html>
<html lang="en">
  <head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>My Shop - TON</title><link rel="stylesheet" href="styles.css" /><link rel="stylesheet" href="shell.css" /></head>
  <body data-page="my-shop">
    <div class="app-shell"><header class="topbar"><div class="brand"><img class="brand-mark" id="brand-logo" src="logo/ton.png" alt="TON logo" /><div><strong id="brand-name">Teachers Online Network</strong><span id="brand-subtitle"></span></div></div><nav class="top-links"><button data-nav="news">News</button><button data-nav="blogs">Blogs</button><button data-nav="videos">Videos</button><button data-nav="shop">Shop</button><button data-nav="partner">Partner Ads</button><button data-nav="profile">Profile</button></nav></header><aside class="sidenav"><button data-nav="swap">SwapTool</button><button data-nav="matches">Matches</button><button data-nav="messages">Messages</button><button data-nav="notifications">Notifications</button><button data-nav="videos">Videos</button><button data-nav="partner">Partner Ads</button><button data-nav="my-shop">My Shop</button><button data-nav="my-blog">My Blog/Vlog</button></aside><main class="content"><section class="route-card"><div class="page-header"><div><p class="eyebrow">Partner Store</p><h2>My Shop</h2></div><span class="status-pill">Sales ID <strong id="sales-id">UDPBB27PE9</strong></span></div><div class="auth-message" id="page-message"></div><form class="panel form-grid" id="product-form"><label>Product Name <input id="product-name" type="text" placeholder="Enter your product title" /></label><label>Type <select id="product-type"><option value="EBOOK">EBOOK</option><option value="PAST_PAPER">PAST_PAPER</option><option value="VIDEO_COURSE">VIDEO_COURSE</option></select></label><label>Sale Price (KES) <input id="product-price" type="number" min="50" placeholder="Set specific price" /></label><label id="pdf-upload-label">Upload PDF materials <input id="product-files" type="file" accept="application/pdf" multiple /></label><label id="video-upload-label" style="display:none">Upload Video <input id="product-video" type="file" accept="video/*" /></label><div class="panel" id="upload-preview" style="min-height: 60px;">No files selected yet.</div><button type="submit">Submit for Verification</button></form><div class="panel"><h3>Verification Pipeline</h3><div class="step-row"><span>1</span>Virus scan</div><div class="step-row"><span>2</span>File validation</div><div class="step-row"><span>3</span>Copyright review</div><div class="step-row"><span>4</span>Admin approval</div></div></section></main></div>
    <script src="multipage.js"></script>
  </body>
</html>
