<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password - TON</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="shell.css" />
  </head>
  <body data-page="forgot-password">
    <div class="app-shell">
      <header class="topbar">
        <div class="brand"><img class="brand-mark" id="brand-logo" src="logo/ton.png" alt="TON logo" /><div><strong id="brand-name">Teachers Online Network</strong><span id="brand-subtitle"></span></div></div>
        <nav class="top-links"><button data-nav="news">News</button><button data-nav="blogs">Blogs</button><button data-nav="videos">Videos</button><button data-nav="shop">Shop</button><button data-nav="partner">Partner Ads</button><button data-nav="profile">Profile</button></nav>
      </header>
      <aside class="sidenav"><button data-nav="swap">SwapTool</button><button data-nav="matches">Matches</button><button data-nav="messages">Messages</button><button data-nav="notifications">Notifications</button><button data-nav="videos">Videos</button><button data-nav="partner">Partner Ads</button><button data-nav="my-shop">My Shop</button><button data-nav="forgot-password">Forgot Password</button></aside>
      <main class="content">
        <section class="route-card">
          <div class="page-header"><div><p class="eyebrow">Account Recovery</p><h2>Forgot Password</h2></div></div>
          <div class="auth-message" id="page-message"></div>
          <form class="panel form-grid" id="forgot-password-form">
            <label>Registered Email or Phone <input id="forgot-identifier" type="text" placeholder="Enter your email or phone" /></label>
            <label>Send reset code via <select id="forgot-method"><option value="EMAIL">Email</option><option value="SMS">Text message</option></select></label>
            <button type="submit">Request Reset</button>
          </form>
        </section>
      </main>
    </div>
    <script src="multipage.js"></script>
  </body>
</html>
