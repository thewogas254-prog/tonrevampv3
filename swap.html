<!doctype html>
<html lang="en">
  <head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>EasySwap - SwapTool</title><link rel="stylesheet" href="styles.css" /><link rel="stylesheet" href="shell.css" /></head>
  <body data-page="swap">
    <div class="app-shell"><header class="topbar"><div class="brand"><img class="brand-mark" id="brand-logo" src="logo/swap.png" alt="EasySwap logo" /><div><strong id="brand-name">EasySwap</strong><span id="brand-subtitle"></span></div></div><nav class="top-links"><button data-nav="news">News</button><button data-nav="blogs">Blogs</button><button data-nav="videos">Videos</button><button data-nav="shop">Shop</button><button data-nav="partner">Partner Ads</button><button data-nav="profile">Profile</button></nav></header><aside class="sidenav"><button data-nav="swap">SwapTool</button><button data-nav="matches">Matches</button><button data-nav="messages">Messages</button><button data-nav="notifications">Notifications</button><button data-nav="videos">Videos</button><button data-nav="partner">Partner Ads</button><button data-nav="my-shop">My Shop</button><button data-nav="my-blog">My Blog/Vlog</button></aside><main class="content"><section class="route-card"><div class="page-header"><div><p class="eyebrow">Swap Engine</p><h2>Request a Mutual Transfer Match</h2></div></div><div class="layout-two"><form id="swap-form" class="panel form-grid"><label>Subject Combination <input id="swap-subject" readonly /></label><label>Current County <input id="swap-current" readonly /></label><label>Desired County <select id="desired-county"></select></label><label>Desired Move Month <input id="move-month" type="month" value="2026-08" /></label><label>Urgency <select id="urgency"><option value="URGENT">Urgent</option><option value="NOT_URGENT">Not urgent</option></select></label><button type="submit">Get Swap</button></form><div class="panel"><h3>Matching Rule</h3><div class="logic-box">current county = other desired county<br />desired county = other current county<br />same level and subject</div></div></div><div class="ad-slot ad-slot-wide" data-ad-slot="swap-below"></div><div class="auth-message" id="page-message"></div></section></main></div>
    <script src="multipage.js"></script>
  </body>
</html>
