<!doctype html>
<html lang="en">
  <head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Messages - TON</title><link rel="stylesheet" href="styles.css" /><link rel="stylesheet" href="shell.css" /></head>
  <body data-page="messages">
    <div class="app-shell"><header class="topbar"><div class="brand"><img class="brand-mark" id="brand-logo" src="logo/ton.png" alt="TON logo" /><div><strong id="brand-name">Teachers Online Network</strong><span id="brand-subtitle"></span></div></div><nav class="top-links"><button data-nav="news">News</button><button data-nav="blogs">Blogs</button><button data-nav="videos">Videos</button><button data-nav="shop">Shop</button><button data-nav="partner">Partner Ads</button><button data-nav="profile">Profile</button></nav></header><aside class="sidenav"><button data-nav="swap">SwapTool</button><button data-nav="matches">Matches</button><button data-nav="messages">Messages</button><button data-nav="notifications">Notifications</button><button data-nav="videos">Videos</button><button data-nav="partner">Partner Ads</button><button data-nav="my-shop">My Shop</button><button data-nav="my-blog">My Blog/Vlog</button></aside><main class="content"><section class="route-card"><div class="page-header"><div><p class="eyebrow">Messaging</p><h2>Direct Messages</h2></div></div><div class="auth-message" id="page-message"></div><div class="chat-layout"><div class="conversations-panel"><div class="conversations-header"><h3>Conversations</h3><button class="new-chat-btn" id="new-chat-btn">New Chat</button></div><div class="list compact-results" id="conversations-list"></div></div><div class="chat-panel" id="chat-panel"><div class="chat-header" id="chat-header"><div class="chat-user-info"><h3 id="chat-user-name">Select a conversation</h3><span class="chat-status" id="chat-status">Offline</span></div><div class="chat-actions"><button class="chat-action-btn" id="attach-btn">📎</button><button class="chat-action-btn" id="emoji-btn">😊</button><button class="chat-action-btn" id="more-btn">⋯</button></div></div><div class="chat-messages" id="chat-messages"><div class="no-chat-selected"><p>Select a conversation to start messaging</p></div></div><div class="chat-composer"><div class="composer-input-container"><div class="message-input-wrapper"><textarea id="message-input" placeholder="Type a message..." rows="1"></textarea><div class="input-actions"><button class="attach-file-btn" id="file-attach-btn">📎</button><button class="emoji-picker-btn" id="emoji-picker-btn">😊</button></div></div><div class="composer-actions"><button class="send-btn" id="send-btn" disabled>Send</button></div></div><div class="typing-indicator" id="typing-indicator" style="display: none;"><span class="typing-dots"><span></span><span></span><span></span></span> Someone is typing...</div></div></div></div></section></main></div>
    <script src="multipage.js"></script>
  </body>
</html>
