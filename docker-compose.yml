services:
  postgres:
    image: postgres:16-alpine
    container_name: ton-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ton_user
      POSTGRES_PASSWORD: ton_password
      POSTGRES_DB: ton_dev
    ports:
      - "5432:5432"
    volumes:
      - ton_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ton_user -d ton_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  ton_postgres_data:
