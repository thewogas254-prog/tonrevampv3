<!doctype html>
<html lang="en">
  <head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Profile - TON</title><link rel="stylesheet" href="styles.css" /><link rel="stylesheet" href="shell.css" /></head>
  <body data-page="profile">
    <div class="app-shell">
      <header class="topbar"><div class="brand"><img class="brand-mark" id="brand-logo" src="logo/ton.png" alt="TON logo" /><div><strong id="brand-name">Teachers Online Network</strong><span id="brand-subtitle"></span></div></div><nav class="top-links"><button data-nav="news">News</button><button data-nav="blogs">Blogs</button><button data-nav="videos">Videos</button><button data-nav="shop">Shop</button><button data-nav="partner">Partner Ads</button><button id="logout-button">Logout</button></nav></header>
      <aside class="sidenav"><button data-nav="swap">SwapTool</button><button data-nav="matches">Matches</button><button data-nav="messages">Messages</button><button data-nav="notifications">Notifications</button><button data-nav="videos">Videos</button><button data-nav="partner">Partner Ads</button><button data-nav="my-shop">My Shop</button><button data-nav="my-blog">My Blog/Vlog</button></aside>
      <main class="content"><section class="route-card"><div class="page-header"><div><p class="eyebrow">Profile Engine</p><h2>Teacher Profile</h2></div><div class="page-actions"><button id="edit-profile-button" type="button">Edit Profile</button><button class="secondary" id="cancel-profile-edit" type="button" hidden>Cancel</button></div></div><form id="profile-form" class="panel form-grid profile-readonly"><label>Teaching Level <select id="level"><option value="SECONDARY">Secondary</option><option value="PRIMARY">Primary</option></select></label><label>Subject Combination <select id="subject-combination"></select></label><label>Current County <select id="current-county"></select></label><label>Sub-county <select id="sub-county"></select></label><label>School Name <input id="school-name" /></label><label class="checkbox-label"><input id="allow-messages" type="checkbox" checked /><span>Allow messages</span></label><label class="checkbox-label"><input id="allow-calls" type="checkbox" checked /><span>Allow calls</span></label><button id="save-profile-button" type="submit" hidden>Save Changes</button></form><div class="panel account-edit-panel"><h3>Login Change Limits</h3><div class="metrics-row"><div class="metric-card"><span>Email changes</span><strong>2 / month</strong></div><div class="metric-card"><span>Phone changes</span><strong>2 / month</strong></div><div class="metric-card"><span>Password changes</span><strong>5 / month</strong></div></div><p>Email, phone, and password edits will be enforced by the auth service when account settings endpoints are added.</p></div><div class="auth-message" id="page-message"></div></section></main>
    </div>
    <script src="multipage.js"></script>
  </body>
</html>
