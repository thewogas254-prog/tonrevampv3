<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Other Matches - EasySwap</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="shell.css" />
  </head>
  <body data-page="other-matches">
    <div class="app-shell">
      <header class="topbar">
        <div class="brand"><img class="brand-mark" id="brand-logo" src="logo/swap.png" alt="EasySwap logo" /><div><strong id="brand-name">EasySwap</strong><span id="brand-subtitle"></span></div></div>
        <nav class="top-links"><button data-nav="news">News</button><button data-nav="blogs">Blogs</button><button data-nav="videos">Videos</button><button data-nav="shop">Shop</button><button data-nav="partner">Partner Ads</button><button data-nav="profile">Profile</button></nav>
      </header>
      <aside class="sidenav"><button data-nav="swap">SwapTool</button><button data-nav="matches">Matches</button><button data-nav="other-matches">Other Matches</button><button data-nav="messages">Messages</button><button data-nav="notifications">Notifications</button><button data-nav="videos">Videos</button><button data-nav="partner">Partner Ads</button><button data-nav="my-shop">My Shop</button></aside>
      <main class="content">
        <section class="route-card">
          <div class="page-header"><div><p class="eyebrow">Swap Requests</p><h2>Other Matches</h2></div><span class="status-pill" id="other-matches-summary">Loading swap requests...</span></div>
          <div class="list compact-results" id="other-matches-list"></div>
        </section>
      </main>
    </div>
    <script src="multipage.js"></script>
  </body>
</html>
