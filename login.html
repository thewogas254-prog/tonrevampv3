<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In - Teachers Online Network</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="shell.css" />
  </head>
  <body data-page="login">
    <div class="app-shell auth-locked">
      <header class="topbar">
        <div class="brand"><img class="brand-mark" id="brand-logo" src="logo/ton.png" alt="TON logo" /><div><strong id="brand-name">Teachers Online Network</strong><span id="brand-subtitle">Professional infrastructure for educators</span></div></div>
      </header>
      <main class="content">
        <section class="auth-panel route-card">
          <div class="auth-copy"><p class="eyebrow">Secure Access</p><h1>Sign In</h1><p>Access EasySwap, messages, marketplace, and creator tools with your verified account.</p></div>
          <div class="auth-card">
            <div class="auth-tabs">
              <button type="button" onclick="location.href='/signup'">Create Account</button>
              <button type="button" class="active" data-login-mode="teacher" id="teacher-login-tab">Teacher Sign In</button>
              <button type="button" data-login-mode="admin" id="admin-login-tab">Admin Sign In</button>
            </div>
            <form id="login-form" class="auth-form">
              <div class="auth-mode-panel active" data-mode="teacher">
                <label>Email, Phone, or Handle <input id="login-identifier" autocomplete="username" value="" /><small></small></label>
                <label>Password
                  <div class="password-field">
                    <input id="login-password" type="password" autocomplete="current-password" value="" />
                    <button type="button" data-password-toggle="login-password">Show</button>
                  </div>
                  <small></small>
                </label>
                <button type="submit">Sign In</button>
              </div>
              <div class="auth-mode-panel" data-mode="admin">
                <label>Admin Email <input id="admin-email" autocomplete="username" value="" /><small></small></label>
                <label>Password
                  <div class="password-field">
                    <input id="admin-password" type="password" autocomplete="current-password" value="" />
                    <button type="button" data-password-toggle="admin-password">Show</button>
                  </div>
                  <small></small>
                </label>
                <button type="submit">Admin Sign In</button>
              </div>
              <div class="auth-message" id="page-message"></div>
            </form>
          </div>
        </section>
      </main>
    </div>
    <script src="multipage.js"></script>
  </body>
</html>
