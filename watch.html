<!doctype html>
<html lang="en">
  <head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Watch - EasySwap Creators</title><link rel="stylesheet" href="styles.css" /><link rel="stylesheet" href="shell.css" /></head>
  <body data-page="watch">
    <div class="app-shell"><header class="topbar"><div class="brand"><img class="brand-mark" id="brand-logo" src="logo/creators.png" alt="Creators logo" /><div><strong id="brand-name">EasySwap Creators</strong><span id="brand-subtitle"></span></div></div><nav class="top-links"><button data-nav="news">News</button><button data-nav="blogs">Blogs</button><button data-nav="videos">Videos</button><button data-nav="shop">Shop</button><button data-nav="partner">Partner Ads</button><button data-nav="profile">Profile</button></nav></header><aside class="sidenav"><button data-nav="swap">SwapTool</button><button data-nav="matches">Matches</button><button data-nav="messages">Messages</button><button data-nav="notifications">Notifications</button><button data-nav="videos">Videos</button><button data-nav="partner">Partner Ads</button><button data-nav="my-shop">My Shop</button><button data-nav="my-blog">My Blog/Vlog</button></aside><main class="content"><section class="watch-page"><div class="watch-main"><div class="video-player" id="watch-player"><video id="video-element" controls preload="metadata"><source id="video-source" type="video/mp4">Your browser does not support the video tag.</video><div class="play-overlay" id="play-overlay"><div class="play-icon">▶</div></div></div><h2 id="watch-title"></h2><div class="auth-message" id="page-message"></div><div class="watch-meta"><div><strong id="watch-creator"></strong><span id="watch-stats"></span></div><div class="watch-actions"><button class="follow-btn" id="follow-btn">Follow</button><button class="subscribe-btn" id="subscribe-btn">Subscribe</button></div></div><div class="engagement-bar"><button class="engagement-btn like-btn" id="like-btn">👍 <span id="watch-likes">0</span></button><button class="engagement-btn comment-btn" id="comment-btn">💬 Comment</button><button class="engagement-btn share-btn" id="share-btn">📤 Share</button><button class="engagement-btn save-btn" id="save-btn">🔖 Save</button><button class="engagement-btn playlist-btn" id="playlist-btn">📋 Playlist</button><button class="engagement-btn danger" id="report-video-btn">🚨 Report</button></div><div class="panel watch-description"><p id="watch-description"></p></div><div class="comments-section"><h3>Comments (<span id="comment-count">0</span>)</h3><div class="comment-form" id="video-comment-form"><textarea id="video-comment-input" placeholder="Add a comment..." rows="3"></textarea><button id="submit-video-comment" disabled>Comment</button></div><div class="comments-list" id="comments-list"></div></div></div><aside class="watch-rail"><h3>Up Next</h3><div id="related-videos"></div><button data-nav="videos">Back to Videos</button></aside></section></main></div>
    <script src="multipage.js"></script>
  </body>
</html>
